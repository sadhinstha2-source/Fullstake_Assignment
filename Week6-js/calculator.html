<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2e2e2e;
            --accent: #c8f135;
            --text: #f0f0f0;
            --muted: #666;
            --error: #ff5c5c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 0 60px rgba(200, 241, 53, 0.04);
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0.75rem;
            align-items: end;
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }

        input[type="text"], select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            padding: 0.7rem 0.9rem;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent);
        }

        select {
            cursor: pointer;
            text-align: center;
            font-size: 1.3rem;
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: #0f0f0f;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.9rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }

        #result {
            margin-top: 1.5rem;
            padding: 1.2rem;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            text-align: center;
            min-height: 56px;
            transition: all 0.3s;
        }

        #result.show {
            border-color: var(--accent);
            color: var(--accent);
        }

        #result.error {
            border-color: var(--error);
            color: var(--error);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Calculator</h1>
        <p class="subtitle">Enter two numbers and choose an operation</p>

        <div class="row">
            <div>
                <label>Number 1</label>
                <input type="text" id="txtNo1" placeholder="0">
            </div>
            <div>
                <label>Op</label>
                <select id="ddOperator">
                    <option value="add">+</option>
                    <option value="subtract">−</option>
                    <option value="multiply">×</option>
                    <option value="divide">÷</option>
                </select>
            </div>
            <div>
                <label>Number 2</label>
                <input type="text" id="txtNo2" placeholder="0">
            </div>
        </div>

        <button class="btn" onclick="calculate()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            let n1 = document.getElementById("txtNo1").value;
            let n2 = document.getElementById("txtNo2").value;
            let op = document.getElementById("ddOperator").value;
            let resultDiv = document.getElementById("result");

            // Validation
            if (n1 === "" || n2 === "") {
                resultDiv.textContent = "Please enter both numbers";
                resultDiv.className = "error";
                return;
            }
            if (isNaN(n1) || isNaN(n2)) {
                resultDiv.textContent = "Please enter valid numbers only";
                resultDiv.className = "error";
                return;
            }

            n1 = parseFloat(n1);
            n2 = parseFloat(n2);

            let answer;
            let symbol;

            if (op === "add") {
                answer = n1 + n2;
                symbol = "+";
            } else if (op === "subtract") {
                answer = n1 - n2;
                symbol = "−";
            } else if (op === "multiply") {
                answer = n1 * n2;
                symbol = "×";
            } else if (op === "divide") {
                if (n2 === 0) {
                    resultDiv.textContent = "Can't divide by zero";
                    resultDiv.className = "error";
                    return;
                }
                answer = n1 / n2;
                symbol = "÷";
            }

            // Round to avoid floating point mess
            answer = Math.round(answer * 1000000) / 1000000;

            resultDiv.textContent = n1 + " " + symbol + " " + n2 + " = " + answer;
            resultDiv.className = "show";
        }

        // Allow Enter key
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") calculate();
        });
    </script>
</body>
</html>
